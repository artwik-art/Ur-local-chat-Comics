<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Comic</title>

    <style>

        body{
            margin:0;
            background:black;
            font-family:Arial, sans-serif;
            text-align:center;
            color:white;
        }

        h1{
            margin-top:40px;
            font-size:60px;
        }

        .chapter-button{
            display:block;
            width:320px;
            margin:40px auto;
            padding:25px;
            background:#222;
            color:white;
            text-decoration:none;
            font-size:30px;
            border-radius:15px;
            transition:0.3s;
        }

        .chapter-button:hover{
            background:#555;
            transform:scale(1.05);
        }

    </style>
</head>

<body>

    <h1>ur local chat comics</h1>

    <a class="chapter-button" href="ch1.html">
        CHAPTER 1
    </a>
